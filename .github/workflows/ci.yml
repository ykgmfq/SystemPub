name: CI
permissions:
  contents: read
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
  build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: just build ${{ matrix.arch }}
  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: just test
