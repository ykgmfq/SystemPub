name: Release
permissions:
  contents: read
on:
  push:
    tags: ["v*"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: just test
  release:
    runs-on: ubuntu-latest
    needs: [test]
    container: fedora:latest
    permissions:
      contents: write
    steps:
      - name: Install build tools
        run: dnf install -y copr-cli rpm-build golang git-core gh
      - uses: actions/checkout@v6
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Check that the tag matches the version in main.go
        run: test "v$(awk -F'"' '/version =/ {print $2}' main.go)" = "$GITHUB_REF_NAME"
      - name: Build SRPM
        id: srpm
        env:
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/build-srpm.sh
      - name: Submit COPR build
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
          SRPM: ${{ steps.srpm.outputs.srpm }}
        run: bash .github/scripts/submit-copr.sh
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SRPM: ${{ steps.srpm.outputs.srpm }}
        run: bash .github/scripts/release-github.sh
