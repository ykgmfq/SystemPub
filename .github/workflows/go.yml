# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
name: Go
permissions:
  contents: read
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: |
          just build ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: systempub-${{ matrix.arch }}
          path: /tmp/systempub-${{ matrix.arch }}
          if-no-files-found: error
          compression-level: 0
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: just test
  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - uses: oras-project/setup-oras@v1
      - run: sudo apt-get install -y squashfs-tools
      - run: just sysext amd64 && just sysext arm64
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push to ghcr.io
        id: push
        env:
          IMAGE_BASE: ghcr.io/${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/push-sysext.sh
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.amd64_digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.push.outputs.image }}
          subject-digest: ${{ steps.push.outputs.arm64_digest }}
          push-to-registry: true
